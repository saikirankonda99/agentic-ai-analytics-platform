[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q -p no:cacheprovider"
markers = [
    "e2e: browser-based Playwright end-to-end tests",
    "openai: tests that require a configured OpenAI API key",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py311"]
