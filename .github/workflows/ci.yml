name: Platform CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  OPENAI_API_KEY: ""
  STARTUP_VALIDATION_STRICT: "false"
  AUTH_ADMIN_PASSWORD: "ci-admin-password"
  AUTH_ANALYST_PASSWORD: "ci-analyst-password"
  AUTH_VIEWER_PASSWORD: "ci-viewer-password"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ruff
        run: python -m ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Pytest
        run: python -m pytest

      - name: Upload pytest cache diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache
          path: .pytest_cache
          if-no-files-found: ignore

  startup:
    name: Startup Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Runtime startup validation
        run: python -m backend.startup

      - name: FastAPI startup probe
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from backend.main import app

          client = TestClient(app)
          health = client.get("/health")
          diagnostics = client.get("/diagnostics")
          assert health.status_code == 200, health.text
          assert health.json()["status"] == "ok"
          assert diagnostics.status_code == 200, diagnostics.text
          assert "startup" in diagnostics.json()
          PY

      - name: Streamlit startup probe
        shell: bash
        run: |
          python -m streamlit run app.py \
            --server.headless true \
            --server.port 8501 \
            --browser.gatherUsageStats false > streamlit.log 2>&1 &
          STREAMLIT_PID=$!
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8501/_stcore/health >/dev/null; then
              kill "$STREAMLIT_PID"
              wait "$STREAMLIT_PID" || true
              exit 0
            fi
            if ! kill -0 "$STREAMLIT_PID" 2>/dev/null; then
              cat streamlit.log
              exit 1
            fi
            sleep 1
          done
          cat streamlit.log
          kill "$STREAMLIT_PID" || true
          exit 1

      - name: Upload Streamlit logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-startup-log
          path: streamlit.log
          if-no-files-found: ignore

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          RUN_E2E: "1"
          E2E_HEADLESS: "true"
          E2E_ADMIN_PASSWORD: ${{ env.AUTH_ADMIN_PASSWORD }}
          AUTH_ADMIN_PASSWORD: ${{ env.AUTH_ADMIN_PASSWORD }}
          AUTH_ANALYST_PASSWORD: ${{ env.AUTH_ANALYST_PASSWORD }}
          AUTH_VIEWER_PASSWORD: ${{ env.AUTH_VIEWER_PASSWORD }}
          OPENAI_API_KEY: ""
        run: python -m pytest tests/e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/playwright
          if-no-files-found: ignore

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deployment-safety:
    name: Deployment Safety
    runs-on: ubuntu-latest
    needs: [startup, docker, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment files
        run: |
          test -f Dockerfile.backend
          test -f Dockerfile.frontend
          test -f docker-compose.yml
          test -f .env.example
          grep -q "OPENAI_API_KEY" .env.example
          grep -q "WORKFLOW_DATABASE_URL" .env.example
