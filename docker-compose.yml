services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://analytics:analytics@postgres:5432/analytics
      WORKFLOW_DATABASE_URL: postgresql://analytics:analytics@postgres:5432/analytics
      POSTGRES_URL: postgresql://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      VECTOR_DATABASE_URL: postgresql://analytics:analytics@postgres:5432/analytics
      STARTUP_VALIDATION_STRICT: "true"
    ports:
      - "8000:8000"
    volumes:
      - workflow-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env
    environment:
      BACKEND_HTTP_URL: http://backend:8000
      BACKEND_WS_URL: ws://backend:8000
      DATABASE_URL: postgresql://analytics:analytics@postgres:5432/analytics
      WORKFLOW_DATABASE_URL: postgresql://analytics:analytics@postgres:5432/analytics
      STARTUP_VALIDATION_STRICT: "true"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  workflow-data:
