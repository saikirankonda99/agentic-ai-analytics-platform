services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      WORKFLOW_DATABASE_URL: sqlite:////app/data/workflow_runtime.db
      POSTGRES_URL: postgresql://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      VECTOR_DATABASE_URL: postgresql://analytics:analytics@postgres:5432/analytics
    ports:
      - "8000:8000"
    volumes:
      - workflow-data:/app/data
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env
    environment:
      BACKEND_HTTP_URL: http://backend:8000
      BACKEND_WS_URL: ws://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
  workflow-data:
